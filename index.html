


<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAKURITA MODZ | SUPREME V33</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #bc13fe; --neon: #00ff7f; --bg: #000; --card: rgba(15, 15, 15, 0.98); --red: #ff3131; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { background: #000; color: #fff; overflow: hidden; height: 100vh; width: 100vw; }
        
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* TOAST PERSONALIZADO (ALERTAS IGUAL A LA PAGINA) */
        #toast-container { position: fixed; top: 20px; left: 20px; right: 20px; z-index: 30000; pointer-events: none; }
        .toast { background: #0a0a0a; border-left: 5px solid var(--primary); padding: 15px; border-radius: 10px; margin-bottom: 10px; font-size: 11px; box-shadow: 0 5px 15px #000; animation: slideIn 0.3s ease; color: #fff; border: 1px solid #222; font-family: 'Orbitron'; }
        .toast.error { border-left-color: var(--red); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* PANTALLA DE CARGA */
        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(188, 19, 254, 0.2); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* VISTAS */
        .view { display: none; position: absolute; inset: 0; z-index: 10; width: 100%; height: 100%; overflow-y: auto; align-items: center; justify-content: center; padding: 20px; }
        .view.active { display: flex; flex-direction: column; }
        .view.home-active { display: block; padding: 0; }

        .home-section { display: none; padding: 20px; padding-bottom: 100px; animation: fadeIn 0.3s ease; }
        .home-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* AUTH BOXES (RESTAURADOS) */
        .auth-box { background: rgba(5, 5, 5, 0.95); padding: 35px 25px; border-radius: 20px; border: 1px solid var(--primary); width: 100%; max-width: 350px; text-align: center; z-index: 20; box-shadow: 0 0 20px rgba(188, 19, 254, 0.2); }
        .input-group { position: relative; margin-bottom: 25px; width: 100%; }
        .input-group input { width: 100%; padding: 10px 5px; background: transparent; border: none; border-bottom: 1px solid #333; color: #fff; outline: none; }
        .input-group label { position: absolute; top: 10px; left: 5px; color: #666; transition: 0.3s; pointer-events: none; font-size: 14px; }
        .input-group input:focus ~ label, .input-group input:valid ~ label { top: -18px; font-size: 11px; color: var(--primary); }

        /* HEADER & DRAWABLE */
        header { width: 100%; height: 70px; background: rgba(5,5,5,0.98); display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        .menu-icon { font-size: 28px; color: var(--primary); cursor: pointer; }
        .overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 8000; display: none; backdrop-filter: blur(4px); }
        .drawer { position: fixed; top: 0; left: -310px; width: 300px; height: 100vh; background: #080808; border-right: 3px solid var(--primary); z-index: 9999; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .drawer.active { left: 0 !important; }
        .nav-opt { padding: 15px 25px; display: flex; align-items: center; gap: 20px; cursor: pointer; color: #ddd; font-size: 12px; border-bottom: 1px solid #111; }
        .nav-opt i { font-style: normal; font-size: 20px; color: var(--primary); width: 25px; }

        /* CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; padding: 0 15px; }
        .card-view { background: var(--card); border-radius: 15px; border: 1px solid #222; border-bottom: 3px solid var(--primary); text-align: center; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .card-img { width: 100%; height: 90px; object-fit: contain; background: #050505; padding: 10px; }
        .card-title { font-family: 'Orbitron'; font-size: 10px; padding: 10px 5px; color: #fff; }

        /* MODALES */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #0a0a0a; border: 2px solid var(--primary); border-radius: 20px; width: 100%; max-width: 320px; padding: 25px; text-align: center; position: relative; }
        .data-box { background: #111; padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px dashed var(--primary); }
        .data-box b { font-size: 14px; color: var(--neon); font-family: 'Orbitron'; word-break: break-all; }
        
        .price-item { background: #111; padding: 12px; border-radius: 12px; border: 1px solid #222; display: flex; justify-content: space-between; margin-bottom: 8px; cursor: pointer; font-size: 12px; }
        .price-item.selected { border-color: var(--neon); background: rgba(0,255,127,0.05); }

        .btn-main { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 10px; color: #fff; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

    <div id="toast-container"></div>
    <div id="loading-screen"><div class="spinner"></div></div>
    <div id="particles-js"></div>
    <div class="overlay-bg" id="ov" onclick="toggleMenu()"></div>

    <div id="v-login" class="view">
        <div class="auth-box">
            <h1 style="font-family:Orbitron; font-size:1.2rem; margin-bottom:25px;">LOGIN <span style="color:var(--primary)">SAKURITA</span></h1>
            <div class="input-group"><input type="email" id="l-email" required><label>Email</label></div>
            <div class="input-group"><input type="password" id="l-pass" required><label>Contraseña</label></div>
            <button class="btn-main" onclick="handleLogin()">INICIAR SESIÓN</button>
            <p style="margin-top:20px; font-size:11px; color:#666">¿No tienes cuenta? <span onclick="nav('v-reg')" style="color:var(--primary); cursor:pointer;">Regístrate</span></p>
        </div>
    </div>

    <div id="v-reg" class="view">
        <div class="auth-box">
            <h1 style="font-family:Orbitron; font-size:1.2rem; margin-bottom:25px;">REGISTRO</h1>
            <div class="input-group"><input type="email" id="r-email" required><label>Email</label></div>
            <div class="input-group"><input type="password" id="r-pass" required><label>Clave</label></div>
            <button class="btn-main" onclick="handleRegister()">CREAR CUENTA</button>
            <p onclick="nav('v-login')" style="margin-top:20px; font-size:11px; color:var(--primary); cursor:pointer;">Volver</p>
        </div>
    </div>

    <nav class="drawer" id="side">
        <div style="padding: 30px; text-align: center; border-bottom: 1px solid #222;">
            <h2 style="font-family:'Orbitron'; color:var(--primary); font-size:14px;">SAKURITA MENU</h2>
        </div>
        <div class="nav-opt" onclick="showSection('sec-tienda')"><i>🔑</i> <span>Tienda de Keys</span></div>
        <div class="nav-opt" onclick="showSection('sec-pagos')"><i>💳</i> <span>Recargas / Pagos</span></div>
        <div class="nav-opt" onclick="handleLogout()" style="color:var(--red)"><i>🚪</i> <span>Cerrar Sesión</span></div>
    </nav>

    <div id="v-home" class="view">
        <header>
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <div style="font-family:'Orbitron'; font-size:12px; margin-left:15px;">SAKURITA <span style="color:var(--primary)">V33</span></div>
            <div id="u-balance" style="margin-left:auto; color:var(--neon); font-family:Orbitron; font-size:10px; border:1px solid var(--neon); padding:5px 10px; border-radius:20px;">$0.00</div>
        </header>

        <section id="sec-tienda" class="home-section active">
            <h3 style="font-family:Orbitron; font-size:10px; margin:20px; color:var(--primary);">COMPRAR KEYS</h3>
            <div class="grid" id="grid-shop"></div>
        </section>

        <section id="sec-pagos" class="home-section">
            <h3 style="font-family:Orbitron; font-size:10px; margin:20px; color:var(--primary);">MÉTODOS DE RECARGA</h3>
            <div class="grid" id="grid-pagos"></div>
        </section>
    </div>

    <div class="modal" id="modal-key-sel">
        <div class="modal-content">
            <h2 id="sel-key-name" style="font-family:Orbitron; font-size:13px; color:var(--primary);">PRODUCTO</h2>
            <div id="price-options" style="margin-top:15px;"></div>
            <button class="btn-main" id="btn-buy-final" disabled onclick="processKeyPurchase()">CONFIRMAR COMPRA</button>
            <button onclick="closeModal('modal-key-sel')" style="background:none; border:none; color:#555; margin-top:10px; font-size:10px;">CANCELAR</button>
        </div>
    </div>

    <div class="modal" id="modal-key-success">
        <div class="modal-content" style="border-color:var(--neon);">
            <h2 style="font-family:Orbitron; font-size:13px; color:var(--neon);">¡EXITO!</h2>
            <div class="data-box"><span>TU KEY:</span><br><b id="res-key">---</b></div>
            <button class="btn-main" onclick="copyKey()" style="background:var(--neon); color:#000;">COPIAR</button>
            <button onclick="closeModal('modal-key-success')" style="background:none; border:none; color:#555; margin-top:10px; font-size:10px;">CERRAR</button>
        </div>
    </div>

    <div class="modal" id="modal-pay-data">
        <div class="modal-content">
            <h2 id="pay-method-name" style="font-family:Orbitron; font-size:13px; color:var(--primary);">PAGO</h2>
            <div class="data-box"><b id="pay-method-details">---</b></div>
            <button class="btn-main" onclick="closeModal('modal-pay-data')">CERRAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getDatabase, ref, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfvk6-vE8iyP-p-RMGBlqmdggjLg1lY7I",
            authDomain: "sakuritamodz-web.firebaseapp.com",
            projectId: "sakuritamodz-web",
            databaseURL: "https://sakuritamodz-web-default-rtdb.firebaseio.com",
            storageBucket: "sakuritamodz-web.firebasestorage.app",
            appId: "1:1025154676126:web:caa752670a1be2759d528f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const dbFS = getFirestore(app);
        const dbRT = getDatabase(app);

        let userData = null;
        let selectedProduct = null;
        let currentSelPrice = 0;
        let currentSelTime = "";

        // ALERTA PERSONALIZADA
        window.toast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast ${type === 'error' ? 'error' : ''}`;
            t.innerText = msg;
            container.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        };

        window.nav = (id) => {
            document.querySelectorAll('.view').forEach(v => { v.style.display='none'; v.classList.remove('active', 'home-active'); });
            const target = document.getElementById(id);
            if(id === 'v-home') { target.style.display='block'; target.classList.add('home-active'); }
            else { target.style.display='flex'; target.classList.add('active'); }
        };

        window.toggleMenu = () => {
            const side = document.getElementById('side'), over = document.getElementById('ov');
            const isOpen = side.classList.toggle('active');
            over.style.display = isOpen ? 'block' : 'none';
        };

        window.showSection = (id) => {
            document.querySelectorAll('.home-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            toggleMenu();
        };

        window.closeModal = (id) => document.getElementById(id).style.display = 'none';

        // COMPRA DE KEYS
        window.openKeyModal = (id) => {
            onValue(ref(dbRT, `shop/keys/${id}`), (snap) => {
                const data = snap.val();
                if(!data) return;
                selectedProduct = { ...data, id: id };
                document.getElementById('sel-key-name').innerText = data.name;
                const opts = document.getElementById('price-options');
                opts.innerHTML = '';
                const labels = { p1: '1 DÍA', p3: '3 DÍAS', p7: '7 DÍAS', p15: '15 DÍAS', p30: '30 DÍAS', pinf: 'PERPETUA' };
                Object.keys(data.prices || {}).forEach(k => {
                    if(data.prices[k] > 0) {
                        opts.innerHTML += `<div class="price-item" onclick="selectPrice(this, '${k}', ${data.prices[k]})">
                            <span>${labels[k] || k}</span><b>$${data.prices[k]}</b>
                        </div>`;
                    }
                });
                document.getElementById('modal-key-sel').style.display = 'flex';
            }, {onlyOnce: true});
        };

        window.selectPrice = (el, time, price) => {
            document.querySelectorAll('.price-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            currentSelPrice = price;
            currentSelTime = time;
            document.getElementById('btn-buy-final').disabled = false;
        };

        window.processKeyPurchase = async () => {
            if(userData.balance < currentSelPrice) return toast("SALDO INSUFICIENTE", "error");
            // Ruta igual al Admin: stock_keys/PRODUCTO/TIEMPO
            const stockPath = `stock_keys/${selectedProduct.id}/${currentSelTime}`;
            const snap = await get(ref(dbRT, stockPath));
            if(!snap.exists()) return toast("SIN STOCK DISPONIBLE", "error");

            const keys = snap.val();
            const firstId = Object.keys(keys)[0];
            const theKey = keys[firstId];

            try {
                await updateDoc(doc(dbFS, "users", auth.currentUser.uid), { balance: userData.balance - currentSelPrice });
                await remove(ref(dbRT, `${stockPath}/${firstId}`));
                closeModal('modal-key-sel');
                document.getElementById('res-key').innerText = theKey;
                document.getElementById('modal-key-success').style.display = 'flex';
                toast("COMPRA EXITOSA");
            } catch(e) { toast("ERROR AL COMPRAR", "error"); }
        };

        // PAGOS
        window.openPaymentModal = (id) => {
            onValue(ref(dbRT, `config/pagos/${id}`), (snap) => {
                const d = snap.val();
                document.getElementById('pay-method-name').innerText = d.name;
                document.getElementById('pay-method-details').innerText = d.details;
                document.getElementById('modal-pay-data').style.display = 'flex';
            }, {onlyOnce: true});
        };

        // AUTH
        onAuthStateChanged(auth, (user) => {
            if (user) {
                nav('v-home');
                onSnapshot(doc(dbFS, "users", user.uid), (s) => {
                    if(s.exists()) {
                        userData = s.data();
                        document.getElementById('u-balance').innerText = `$${userData.balance.toFixed(2)}`;
                    }
                });
                onValue(ref(dbRT, 'shop/keys'), (snap) => {
                    const grid = document.getElementById('grid-shop'); grid.innerHTML = '';
                    snap.forEach(c => {
                        grid.innerHTML += `<div class="card-view" onclick="openKeyModal('${c.key}')">
                            <img src="${c.val().image || 'https://i.ibb.co/mS098S6/sakura-def.png'}" class="card-img">
                            <h4 class="card-title">${c.val().name}</h4>
                        </div>`;
                    });
                });
                onValue(ref(dbRT, 'config/pagos'), (snap) => {
                    const grid = document.getElementById('grid-pagos'); grid.innerHTML = '';
                    snap.forEach(c => {
                        grid.innerHTML += `<div class="card-view" onclick="openPaymentModal('${c.key}')">
                            <img src="https://cdn-icons-png.flaticon.com/512/4341/4341764.png" class="card-img">
                            <h4 class="card-title">${c.val().name}</h4>
                        </div>`;
                    });
                });
            } else { nav('v-login'); }
            setTimeout(() => document.getElementById('loading-screen').style.display='none', 800);
        });

        window.handleLogin = async () => {
            const e = document.getElementById('l-email').value, p = document.getElementById('l-pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); toast("BIENVENIDO"); } 
            catch(err) { toast("DATOS INCORRECTOS", "error"); }
        };

        window.handleRegister = async () => {
            const e = document.getElementById('r-email').value, p = document.getElementById('r-pass').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await setDoc(doc(dbFS, "users", res.user.uid), { email: e, balance: 0.00, status: "active", rango: "Normal" });
                toast("CUENTA CREADA");
            } catch(err) { toast("ERROR AL REGISTRAR", "error"); }
        };

        window.handleLogout = () => signOut(auth);
        window.copyKey = () => { navigator.clipboard.writeText(document.getElementById('res-key').innerText); toast("COPIADO"); };
    </script>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", { "particles": { "number": { "value": 120 }, "color": { "value": "#bc13fe" }, "opacity": { "value": 0.5 }, "size": { "value": 1 }, "line_linked": { "enable": true, "distance": 100, "color": "#bc13fe", "opacity": 0.2 }, "move": { "enable": true, "speed": 1 } } });
    </script>
</body>
</html>
